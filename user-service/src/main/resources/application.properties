# ==========================================
# CẤU HÌNH SERVER & EUREKA
# ==========================================
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
server.port=8811
spring.application.name=user-service
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# ==========================================
# CẤU HÌNH DATABASE (MYSQL - XAMPP)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/users?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE (Chuẩn Spring Boot 3)
# ==========================================
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# ==========================================
# CẤU HÌNH THÔNG BÁO LỖI TÙY CHỈNH
# ==========================================
error.404.schema.details=The resource you are looking for might have been removed, had its name changed, or is temporarily unavailable
error.406.schema.details=This request is not acceptable. Supported MIME types are application/json

