# ==========================================
# CẤU HÌNH SERVER & EUREKA
# ==========================================
server.port=8810
spring.application.name=product-catalog-service
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1

# Eureka Server registration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ==========================================
# CẤU HÌNH DATABASE (MYSQL - XAMPP)
# ==========================================
# Tự động tạo database 'product_catalog' nếu chưa tồn tại
spring.datasource.url=jdbc:mysql://localhost:3306/product_catalog?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE (Spring Boot 3 / Hibernate 6)
# ==========================================
spring.jpa.show-sql=true
# Hibernate 6 tự nhận diện Dialect rất tốt, nhưng khai báo rõ cho MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Tắt tính năng query metadata của Hibernate để khởi động nhanh hơn (tùy chọn)
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
# ==========================================
# UPLOAD ẢNH SẢN PHẨM
# ==========================================
# Thư mục lưu ảnh (relative to working directory, hoặc absolute path)
app.upload-dir=./uploads
# Base URL để tạo imageUrl trả về FE
app.base-url=http://localhost:8810

# Giới hạn kích thước file upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
