# ==========================================
# CẤU HÌNH SERVER & EUREKA
# ==========================================
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
server.port=8813
spring.application.name=order-service

# Đăng ký với Eureka Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ==========================================
# CẤU HÌNH DATABASE (MYSQL - XAMPP)
# ==========================================
# Tự động tạo database 'orders_db' nếu chưa tồn tại
spring.datasource.url=jdbc:mysql://localhost:3306/orders_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# ==========================================
# CẤU HÌNH REDIS & SESSION (Spring Boot 3)
# ==========================================
# Spring Boot 3 sử dụng cấu hình 'data.redis' thay vì 'redis' cũ
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Cấu hình lưu trữ Session vào Redis
spring.session.store-type=redis
spring.session.redis.namespace=spring:session:order
# Flush mode: On Save (mặc định) giúp tối ưu hiệu năng
spring.session.redis.flush-mode=on_save