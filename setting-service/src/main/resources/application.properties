# ==========================================
# CẤU HÌNH SERVER & EUREKA
# ==========================================
server.port=8816
spring.application.name=setting-service
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# ==========================================
# CẤU HÌNH DATABASE (MySQL)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/settings_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# ==========================================
# ERROR MESSAGES
# ==========================================
error.404.schema.details=Setting not found
error.406.schema.details=This request is not acceptable. Supported MIME types are application/json