# ==========================================
# CẤU HÌNH SERVER & EUREKA
# ==========================================
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
server.port=8812
spring.application.name=product-recommendation-service

# Đăng ký với Eureka Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ==========================================
# CẤU HÌNH DATABASE (MYSQL - XAMPP)
# ==========================================
# Tự động tạo database 'recommendation_db' nếu chưa có trong XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/recommendation_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.show-sql=true
# Hibernate 6 tự động nhận diện Dialect cho MySQL 8+, không nhất thiết phải chỉ định
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# ==========================================
# CẤU HÌNH FEIGN CLIENT (Tùy chọn cho Spring Boot 3)
# ==========================================
# Giúp theo dõi quá trình gọi API giữa các service nếu cần debug
logging.level.com.rainbowforest.productrecommendationservice.feignclient=DEBUG